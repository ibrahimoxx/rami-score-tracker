<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1628"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C97A" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8C97A" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="2" y="2" width="60" height="60" rx="11" fill="none" stroke="url(#border)" stroke-width="2"/>

  <!-- ♠ top-left -->
  <text x="16" y="30" font-family="Georgia,Times New Roman,serif" font-size="22"
        text-anchor="middle" dominant-baseline="auto" fill="#C9A84C">♠</text>

  <!-- ♥ top-right -->
  <text x="48" y="30" font-family="Georgia,Times New Roman,serif" font-size="22"
        text-anchor="middle" dominant-baseline="auto" fill="#C0392B">♥</text>

  <!-- ♦ bottom-left -->
  <text x="16" y="56" font-family="Georgia,Times New Roman,serif" font-size="22"
        text-anchor="middle" dominant-baseline="auto" fill="#C0392B">♦</text>

  <!-- ♣ bottom-right -->
  <text x="48" y="56" font-family="Georgia,Times New Roman,serif" font-size="22"
        text-anchor="middle" dominant-baseline="auto" fill="#C9A84C">♣</text>
</svg>
